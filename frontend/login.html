<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - TP1</title>
  <link rel="stylesheet" href="./css/estilos.css" />
</head>
<body>
  <div class="login-page">
    <div class="login-card">
      <h1>Ingreso al sistema</h1>
      <p class="subtitulo">UTN - Programación IV</p>

      <form id="loginForm">
        <div class="campo">
          <label for="usuario">Usuario</label>
          <input type="text" id="usuario" name="usuario" placeholder="Ingresá tu usuario" />
        </div>

        <div class="campo">
          <label for="clave">Clave</label>
          <input type="password" id="clave" name="clave" placeholder="Ingresá tu clave" />
        </div>

        <button type="submit" class="btn">Ingresar</button>

<button type="button" class="btn" onclick="window.location.href='./registro.html'">Registrarse</button>
         
      </form>

      <p id="mensaje" class="mensaje"></p>
    </div>
  </div>

  <script src="./js/login.js"></script>
</body>
</html>
